function formatTimeLeft(t){

}

        {cars.map((x,i)=><div key={i} style={{position:"absolute",bottom:8+i*0.5,left:x,filter:`drop-shadow(0 2px 8px ${CARS[i].glow}99) drop-shadow(1px 2px 2px rgba(0,0,0,0.08))`}}>

function App(){
  const[phase,setPhase]=useState("intro");
  const[showChecklist,setShowChecklist]=useState(false);
  const[showAgenda,setShowAgenda]=useState(false);
  function startJourney(){setPhase("exiting");setTimeout(()=>setPhase("schedule"),920);}
  return(
    <>
      {phase!=="schedule"&&<Intro onStart={startJourney} exiting={phase==="exiting"} onChecklist={()=>setShowChecklist(true)}/>}
      {phase==="schedule"&&<Schedule onAgenda={()=>setShowAgenda(true)}/>}
      {showChecklist&&<ChecklistOverlay onClose={()=>setShowChecklist(false)}/>}
      {showAgenda&&<AgendaModal onClose={()=>setShowAgenda(false)}/>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
